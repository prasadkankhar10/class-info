<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>512 | Smart Campus</title>
    <base href="../../">
    <meta name="description" content="Live timetable and status for room.">
    <link rel="stylesheet" href="style.css">
</head>
<body data-room-id="512">
    <div class="container">
        <header>
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to All Rooms
            </a>
            <button class="theme-toggle" id="theme-btn" aria-label="Toggle Dark Mode">
                <svg viewBox="0 0 24 24"><path d="M12 21.05a9 9 0 01-6.36-2.64C1.76 14.54 1.76 8.2 5.64 4.32a9 9 0 014.13-2.19c.47-.13.91.24.79.71a8.03 8.03 0 00.91 5.92 8.03 8.03 0 005.92.91c.47-.12.84.32.71.79a9 9 0 01-2.19 4.13A9 9 0 0112 21.05z"/></svg>
            </button>
        </header>

        <main id="room-content" class="hidden">
            <section class="room-hero">
                <h1 id="room-name">Loading...</h1>
                <p id="room-type" class="text-muted text-sm" style="text-transform: uppercase; letter-spacing: 0.05em;">---</p>
                <div id="room-status-indicator" class="status-indicator">
                    <div class="status-dot"></div>
                    <span id="room-status-text">Checking Status...</span>
                </div>
            </section>

            <section class="details-grid">
                <div class="detail-item">
                    <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span class="detail-label">Capacity</span>
                    <span id="room-capacity" class="detail-value">-- Seats</span>
                </div>
                <div class="detail-item">
                    <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                    <span class="detail-label">Current Time</span>
                    <span id="current-clock" class="detail-value">--:--</span>
                </div>
            </section>

            <section class="equipment-list">
                <h3>Available Equipment</h3>
                <div id="equipment-tags" class="equipment-tags">
                    <!-- Tags injected here -->
                </div>
            </section>

            <section class="timetable-card">
                <div class="timetable-header">
                    <h3 id="timetable-title">Today's Timetable</h3>
                    <div class="filter-group" id="day-selector" style="margin-top: 1rem; padding-bottom: 0;">
                        <!-- Day buttons injected here -->
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Subject & Faculty</th>
                            </tr>
                        </thead>
                        <tbody id="timetable-body">
                            <!-- Timetable rows injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
        </div>

        <div id="error-message" class="hidden text-center" style="padding: 2rem;">
            <svg style="width: 48px; height: 48px; color: var(--status-occupied); margin: 0 auto 1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <h2 style="margin-bottom: 0.5rem;">Room Not Found</h2>
            <p class="text-muted" style="margin-bottom: 1.5rem;">The requested room ID is invalid or does not exist.</p>
            <a href="index.html" class="filter-btn" style="text-decoration: none; display: inline-block; background-color: var(--primary); color: white;">Return Home</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
