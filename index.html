<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus | Rooms & Labs</title>
    <meta name="description" content="Check live availability of classrooms and labs.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1 class="title" style="margin-bottom: 0;">Smart Campus</h1>
                <p class="text-muted text-sm">Find available rooms and labs instantly</p>
            </div>
            <button class="theme-toggle" id="theme-btn" aria-label="Toggle Dark Mode">
                <svg viewBox="0 0 24 24"><path d="M12 21.05a9 9 0 01-6.36-2.64C1.76 14.54 1.76 8.2 5.64 4.32a9 9 0 014.13-2.19c.47-.13.91.24.79.71a8.03 8.03 0 00.91 5.92 8.03 8.03 0 005.92.91c.47-.12.84.32.71.79a9 9 0 01-2.19 4.13A9 9 0 0112 21.05z"/></svg>
            </button>
        </header>

        <section class="controls-card">
            <input type="text" id="search-input" class="search-input" placeholder="Search for a room... e.g. Lab 301">
            <div class="filter-group" id="filter-group">
                <button class="filter-btn active" data-filter="all">All Rooms</button>
                <button class="filter-btn" data-filter="classroom">Classrooms</button>
                <button class="filter-btn" data-filter="lab">Labs</button>
            </div>
        </section>

        <main>
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
            </div>
            <div id="rooms-grid" class="rooms-grid hidden">
                <!-- Room cards injected by JS -->
            </div>
            <div id="no-results" class="hidden text-center text-muted" style="padding: 2rem;">
                No rooms found matching your criteria.
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
